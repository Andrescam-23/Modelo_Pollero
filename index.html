<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollero Mundial 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0e1a;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header h1 span { color: #f5a623; }
  header p { color: #7b8299; font-size: 0.85rem; margin-top: 4px; }

  /* ---- layout ---- */
  .container { max-width: 860px; margin: 0 auto; }

  /* ---- seccion instrucciones ---- */
  .how-to {
    background: #131929;
    border: 1px solid #1e2840;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 28px;
    font-size: 0.83rem;
    color: #7b8299;
    line-height: 1.7;
  }
  .how-to strong { color: #c0c6d8; }
  .how-to code {
    background: #0d1220;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'Consolas', monospace;
    color: #f5a623;
    font-size: 0.82rem;
  }

  /* ---- estado sin datos ---- */
  #no-data {
    text-align: center;
    padding: 60px 20px;
    color: #4a5068;
  }
  #no-data .icon { font-size: 3rem; margin-bottom: 12px; }
  #no-data p { font-size: 0.9rem; line-height: 1.6; }

  /* ---- partidos con odds ---- */
  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #4a5068;
    margin-bottom: 10px;
  }

  .odds-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .odds-chip {
    background: #131929;
    border: 1px solid #1e2840;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.78rem;
    color: #c0c6d8;
    cursor: default;
  }
  .odds-chip .dot { color: #f5a623; margin: 0 5px; }

  /* ---- cards de picks ---- */
  .picks-grid {
    display: grid;
    gap: 18px;
  }

  .pick-card {
    background: #131929;
    border: 1px solid #1e2840;
    border-radius: 14px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
  }
  .pick-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #f5a623, #e05c2a);
  }

  .match-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .match-name {
    font-size: 1.05rem;
    font-weight: 600;
  }
  .match-name .vs { color: #4a5068; font-weight: 400; font-size: 0.85rem; margin: 0 8px; }

  .pick-badge {
    background: linear-gradient(135deg, #f5a623, #e05c2a);
    color: #fff;
    font-size: 1.4rem;
    font-weight: 800;
    padding: 6px 18px;
    border-radius: 8px;
    letter-spacing: 1px;
  }
  .pick-pts {
    font-size: 0.72rem;
    color: #7b8299;
    text-align: center;
    margin-top: 3px;
  }

  /* barras de probabilidad */
  .probs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .prob-item { text-align: center; }
  .prob-label { font-size: 0.68rem; color: #4a5068; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.8px; }
  .prob-bar-wrap {
    background: #0d1220;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .prob-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .prob-bar.home  { background: #4c8ef5; }
  .prob-bar.draw  { background: #7b8299; }
  .prob-bar.away  { background: #e05c2a; }
  .prob-value { font-size: 0.9rem; font-weight: 600; }

  /* lambdas y we */
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding-top: 14px;
    border-top: 1px solid #1e2840;
    font-size: 0.78rem;
    color: #4a5068;
  }
  .meta-item strong { color: #c0c6d8; }

  /* alternativas */
  .alts {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .alt-chip {
    background: #0d1220;
    border: 1px solid #1e2840;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.78rem;
    color: #7b8299;
  }
  .alt-chip span { color: #c0c6d8; font-weight: 600; margin-right: 5px; }

  /* odds display */
  .odds-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .odd-box {
    flex: 1;
    min-width: 70px;
    background: #0d1220;
    border: 1px solid #1e2840;
    border-radius: 8px;
    padding: 7px 10px;
    text-align: center;
  }
  .odd-box .odd-label { font-size: 0.65rem; color: #4a5068; text-transform: uppercase; letter-spacing: 0.8px; }
  .odd-box .odd-val { font-size: 1rem; font-weight: 600; color: #c0c6d8; margin-top: 2px; }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 0.75rem;
    color: #2a3050;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>⚽ Pollero <span>Mundial 2026</span></h1>
    <p>Picks recomendados por el modelo Poisson + ELO + Mercado</p>
  </header>

  <div id="no-data">
    <div class="icon">⏳</div>
    <p>Aún no hay picks generados.<br>
    Vuelve más tarde cuando se actualicen los resultados.</p>
  </div>

  <div id="app" style="display:none">
    <div class="section-title">Partidos con cuotas disponibles</div>
    <div class="odds-chips" id="odds-chips"></div>

    <div class="section-title">Picks recomendados</div>
    <div class="picks-grid" id="picks-grid"></div>
  </div>

</div>

<footer>Datos: eloratings.net · The Odds API · Modelo Poisson</footer>

<script>
async function loadData() {
  try {
    const res = await fetch('picks_data.json?' + Date.now());
    if (!res.ok) throw new Error('no file');
    return await res.json();
  } catch {
    return null;
  }
}

function pct(val) { return (val * 100).toFixed(1) + '%'; }
function pctNum(val) { return (val * 100).toFixed(0); }

function renderOddsChips(matches) {
  const el = document.getElementById('odds-chips');
  if (!matches.length) {
    el.innerHTML = '<span style="color:#4a5068;font-size:0.8rem">Sin partidos con cuotas disponibles actualmente.</span>';
    return;
  }
  el.innerHTML = matches.map(m =>
    `<div class="odds-chip">${m.local}<span class="dot">·</span>${m.visitante}</div>`
  ).join('');
}

function renderPicks(picks) {
  const grid = document.getElementById('picks-grid');
  if (!picks.length) {
    grid.innerHTML = '<p style="color:#4a5068;font-size:0.85rem">Sin picks generados aún. Corre el modelo primero.</p>';
    return;
  }

  grid.innerHTML = picks.map(p => {
    const hasOdds = p.we_market !== null;
    const hasXG   = p.we_xg !== null;

    const oddsRow = hasOdds ? `
      <div class="odds-row">
        <div class="odd-box"><div class="odd-label">Local</div><div class="odd-val">—</div></div>
        <div class="odd-box"><div class="odd-label">Empate</div><div class="odd-val">—</div></div>
        <div class="odd-box"><div class="odd-label">Visit.</div><div class="odd-val">—</div></div>
      </div>` : '';

    const weMeta = [
      `<div class="meta-item">ELO <strong>${p.we_elo}</strong></div>`,
      hasOdds ? `<div class="meta-item">Mercado <strong>${p.we_market}</strong></div>` : '',
      hasXG   ? `<div class="meta-item">xG <strong>${p.we_xg}</strong></div>` : '',
      `<div class="meta-item">We final <strong>${p.we_final}</strong></div>`,
      `<div class="meta-item">λ local <strong>${p.lambda_local}</strong></div>`,
      `<div class="meta-item">λ visit. <strong>${p.lambda_visit}</strong></div>`,
    ].join('');

    return `
    <div class="pick-card">
      <div class="match-header">
        <div class="match-name">
          ${p.local}<span class="vs">vs</span>${p.visitante}
        </div>
        <div>
          <div class="pick-badge">${p.pick_1}</div>
          <div class="pick-pts">${p.pts_1} pts esp.</div>
        </div>
      </div>

      <div class="probs">
        <div class="prob-item">
          <div class="prob-label">Local</div>
          <div class="prob-bar-wrap"><div class="prob-bar home" style="width:${pctNum(p.p_local)}%"></div></div>
          <div class="prob-value">${pct(p.p_local)}</div>
        </div>
        <div class="prob-item">
          <div class="prob-label">Empate</div>
          <div class="prob-bar-wrap"><div class="prob-bar draw" style="width:${pctNum(p.p_empate)}%"></div></div>
          <div class="prob-value">${pct(p.p_empate)}</div>
        </div>
        <div class="prob-item">
          <div class="prob-label">Visitante</div>
          <div class="prob-bar-wrap"><div class="prob-bar away" style="width:${pctNum(p.p_visit)}%"></div></div>
          <div class="prob-value">${pct(p.p_visit)}</div>
        </div>
      </div>

      <div class="alts">
        <span style="font-size:0.72rem;color:#4a5068;align-self:center">Alternativas:</span>
        <div class="alt-chip"><span>${p.pick_2}</span>${p.pts_2} pts</div>
        <div class="alt-chip"><span>${p.pick_3}</span>${p.pts_3} pts</div>
      </div>

      <div class="meta-row">${weMeta}</div>
    </div>`;
  }).join('');
}

(async () => {
  const data = await loadData();
  if (!data) return;

  document.getElementById('no-data').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  renderOddsChips(data.partidos_con_odds || []);
  renderPicks(data.picks || []);
})();
</script>
</body>
</html>
